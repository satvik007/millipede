[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # fxhash is unmaintained but reaches us only through the servo `selectors`
    # stack under `scraper`; there is no maintained drop-in the upstream stack
    # has adopted yet. Revisit when scraper/selectors move off it.
    "RUSTSEC-2025-0057",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
