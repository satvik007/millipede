[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # fxhash is unmaintained but reaches us only through the servo `selectors`
    # stack under `scraper`; there is no maintained drop-in the upstream stack
    # has adopted yet. Revisit when scraper/selectors move off it.
    "RUSTSEC-2025-0057",
    # time < 0.3.47 stack exhaustion when parsing malicious RFC 2822 input.
    # Reaches us only via cookie_store -> cookie expiry parsing; the patched
    # 0.3.47 requires Rust 1.88 and our MSRV is locked at 1.85 (ADR-0001), so
    # cargo refuses the update. Lift this ignore when the MSRV moves past 1.88.
    "RUSTSEC-2026-0009",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    # File-level copyleft; standard to allow as a dependency license. Pulled
    # in by scraper's servo stack (cssparser, selectors, dtoa-short).
    "MPL-2.0",
    # Permissive data license used by webpki-roots for the Mozilla CA bundle.
    "CDLA-Permissive-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path-only (versionless) deps are internal workspace wiring; cargo strips
# them from published packages when they are dev-dependencies. Registry
# wildcards stay denied.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
