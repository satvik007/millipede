name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features
      # Chrome-driven E2E suites live in millipede-browser-chromiumoxide's
      # integration tests and belong to the dedicated browser job below, which
      # provisions a known-good Chrome. Runners have Chrome preinstalled, so
      # discovery would otherwise find it here and run the E2E suites in an
      # environment this job does not prepare (Ubuntu 24.04 AppArmor blocks the
      # Chrome sandbox). Unit tests for that crate still run via --lib.
      - run: cargo test --workspace --all-features --exclude millipede-browser-chromiumoxide
      - run: cargo test -p millipede-browser-chromiumoxide --lib --all-features
      # --lib --tests skips doctests: the README example included via
      # #![doc = include_str!] uses default-feature APIs (HtmlCrawler, memory
      # storage) that do not exist in a no-default-features build.
      - run: cargo test -p millipede --no-default-features --lib --tests
      - run: cargo run -p millipede --example phase0_hello
      - run: cargo run -p millipede --example phase1_queue_demo
      - run: cargo run -p millipede --example basic_engine
      - run: cargo run -p millipede --example autoscale_demo
      - run: cargo run -p millipede --example basic
      - run: cargo run -p millipede --example error_handling
      - run: cargo run -p millipede --example rate_limit
      - run: cargo run -p millipede --example proxy_switcher
      # hackernews is live-network only and is intentionally excluded from CI smoke runs.
      - run: cargo run -p millipede --features http,fingerprint,storage-memory --example fingerprint_crawl

  # Browser tests run on Linux + macOS only; Windows is intentionally excluded
  # (ROADMAP Phase 6 exit criteria). This job owns the chromiumoxide E2E
  # suites; the workspace test job above excludes that crate so the suites run
  # exactly once, against a Chrome this job prepares.
  browser:
    name: browser tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Linux gets a pinned stable Chrome from setup-chrome. macOS uses the
      # runner's preinstalled branded Google Chrome instead: the "Chrome for
      # Testing" build the action installs stalls mid-navigation under
      # chromiumoxide on the macOS runners (E2E suites blow their 120s guards),
      # while branded Chrome is the configuration verified on developer Macs.
      - name: Install Chromium (Linux; cached by the action)
        if: runner.os == 'Linux'
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
      - name: Select Chrome binary
        id: chrome-path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "path=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" >> "$GITHUB_OUTPUT"
          fi
      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor, which
      # breaks Chrome's sandbox at launch ("No usable sandbox!"). Re-enable them
      # for this job; the alternative (--no-sandbox) would leak into the library's
      # default launch flags.
      - name: Allow unprivileged user namespaces for the Chrome sandbox
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Run browser integration tests
        env:
          MILLIPEDE_CHROME: ${{ steps.chrome-path.outputs.path }}
        # --test-threads=1: each E2E test launches real Chrome instances; running
        # them concurrently overloads 3-4 core runners past the tests' 120s guards.
        run: |
          cargo test -p millipede-browser-chromiumoxide -- --nocapture --test-threads=1
          cargo test -p millipede-browser -- --nocapture
      - name: Run browser examples against a local site
        env:
          MILLIPEDE_CHROME: ${{ steps.chrome-path.outputs.path }}
        run: |
          cargo run -p millipede --features browser-chromiumoxide,storage-memory --example browser_crawl
          cargo run -p millipede --features browser-chromiumoxide,html,storage-memory --example smart_crawl

  doc:
    name: rustdoc (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  public-api:
    name: public API
    runs-on: ubuntu-latest
    env:
      CARGO_PUBLIC_API_VERSION: 0.52.0
      PUBLIC_API_TOOLCHAIN: nightly-2026-07-12
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install "$PUBLIC_API_TOOLCHAIN" --profile minimal
      - uses: actions/cache@v4
        id: cargo-public-api-cache
        with:
          path: ~/.cargo/bin/cargo-public-api
          key: ${{ runner.os }}-cargo-public-api-${{ env.CARGO_PUBLIC_API_VERSION }}
      - if: steps.cargo-public-api-cache.outputs.cache-hit != 'true'
        run: cargo install --locked cargo-public-api --version "$CARGO_PUBLIC_API_VERSION"
      - name: Regenerate public API baselines
        run: |
          # The umbrella crate needs --all-features so feature-gated re-exports
          # (browser, fingerprint, ...) are captured in its baseline.
          cargo +"$PUBLIC_API_TOOLCHAIN" public-api -p millipede --all-features --simplified > "docs/api-baselines/millipede.txt"
          for c in millipede-core millipede-storage-memory millipede-storage-fs millipede-http millipede-html millipede-browser millipede-browser-chromiumoxide millipede-fingerprint; do
            cargo +"$PUBLIC_API_TOOLCHAIN" public-api -p "$c" --simplified > "docs/api-baselines/$c.txt"
          done
      - run: git diff --exit-code docs/api-baselines

  semver-checks:
    name: cargo-semver-checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - uses: Swatinem/rust-cache@v2
      - run: cargo semver-checks check-release --workspace --baseline-rev "${{ github.event.pull_request.base.sha }}"

  msrv:
    name: MSRV 1.85 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.85'
      - uses: Swatinem/rust-cache@v2
      - run: cargo +1.85 check --workspace --all-targets --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    # audit-check publishes its report as a check run.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # time < 0.3.47 RFC 2822 stack exhaustion via cookie_store; the fix
          # requires Rust 1.88 and MSRV is locked at 1.85 (see deny.toml).
          ignore: RUSTSEC-2026-0009

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # Excluded for the same reason as the test job: the crate's integration
      # tests need a prepared Chrome and belong to the browser job.
      - run: cargo llvm-cov --workspace --all-features --exclude millipede-browser-chromiumoxide --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
