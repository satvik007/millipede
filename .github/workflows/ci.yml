name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features
      - run: cargo test -p millipede --no-default-features
      - run: cargo run -p millipede --example phase0_hello
      - run: cargo run -p millipede --example phase1_queue_demo
      - run: cargo run -p millipede --example basic_engine
      - run: cargo run -p millipede --example autoscale_demo

  doc:
    name: rustdoc (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  public-api:
    name: public API
    runs-on: ubuntu-latest
    env:
      CARGO_PUBLIC_API_VERSION: 0.52.0
      PUBLIC_API_TOOLCHAIN: nightly-2026-07-12
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install "$PUBLIC_API_TOOLCHAIN" --profile minimal
      - uses: actions/cache@v4
        id: cargo-public-api-cache
        with:
          path: ~/.cargo/bin/cargo-public-api
          key: ${{ runner.os }}-cargo-public-api-${{ env.CARGO_PUBLIC_API_VERSION }}
      - if: steps.cargo-public-api-cache.outputs.cache-hit != 'true'
        run: cargo install --locked cargo-public-api --version "$CARGO_PUBLIC_API_VERSION"
      - name: Regenerate public API baselines
        run: |
          for c in millipede millipede-core millipede-storage-memory millipede-storage-fs millipede-http millipede-html millipede-browser millipede-browser-chromiumoxide millipede-fingerprint; do
            cargo +"$PUBLIC_API_TOOLCHAIN" public-api -p "$c" --simplified > "docs/api-baselines/$c.txt"
          done
      - run: git diff --exit-code docs/api-baselines

  semver-checks:
    name: cargo-semver-checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - uses: Swatinem/rust-cache@v2
      - run: cargo semver-checks check-release --workspace --baseline-rev "${{ github.event.pull_request.base.sha }}"

  msrv:
    name: MSRV 1.85 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.85'
      - uses: Swatinem/rust-cache@v2
      - run: cargo +1.85 check --workspace --all-targets --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
