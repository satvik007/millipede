name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features
      - run: cargo test -p millipede --no-default-features
      - run: cargo run -p millipede --example phase0_hello

  doc:
    name: rustdoc (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  public-api:
    name: public API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-public-api 0.52.x supports rustdoc JSON from nightly-2025-08-02 onward.
      # Regenerate with the two cargo rustdoc commands below, then run:
      # cp target/public-api-core/doc/millipede_core.json crates/millipede-core/public-api/millipede_core.json
      # cp target/public-api-memory/doc/millipede_storage_memory.json crates/millipede-storage-memory/public-api/millipede_storage_memory.json
      - uses: dtolnay/rust-toolchain@nightly-2026-05-25
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api@0.52.0
      - run: cargo rustdoc -p millipede-core --lib --target-dir target/public-api-core -- -Z unstable-options --output-format json
      - run: cargo rustdoc -p millipede-storage-memory --lib --target-dir target/public-api-memory -- -Z unstable-options --output-format json
      - run: cargo public-api diff crates/millipede-core/public-api/millipede_core.json target/public-api-core/doc/millipede_core.json --deny removed --deny changed
      - run: cargo public-api diff crates/millipede-storage-memory/public-api/millipede_storage_memory.json target/public-api-memory/doc/millipede_storage_memory.json --deny removed --deny changed

  msrv:
    name: MSRV 1.85 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.85'
      - uses: Swatinem/rust-cache@v2
      - run: cargo +1.85 check --workspace --all-targets --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
